<aside
  class="fixed top-0 left-0 h-full z-30 flex flex-col bg-[var(--surface-0)] border-r border-[var(--surface-200)] shadow-sm transition-transform duration-300"
  [style.width]="'var(--sidebar-width)'"
  [class.-translate-x-full]="collapsed()">

  <div class="flex items-center gap-3 px-5 h-16 border-b border-[var(--surface-200)]">
    <div class="w-9 h-9 rounded-lg bg-[var(--ink-strong)] flex items-center justify-center shadow-sm">
      <i class="pi pi-shield text-white text-sm"></i>
    </div>
    <div>
      <span class="block text-base font-extrabold text-[var(--surface-900)]">Knights</span>
      <span class="block text-xs text-[var(--surface-500)] leading-none">Admin console</span>
    </div>
  </div>

  <nav class="flex-1 overflow-y-auto py-5 px-3">
    <p class="text-xs font-bold text-[var(--surface-500)] uppercase px-3 mb-2">Main Menu</p>
    <ul class="space-y-1.5">
      @for (item of navItems; track item.route) {
        <li>
          <a [routerLink]="item.route"
             routerLinkActive="bg-[var(--primary-50)] text-[var(--primary-700)] font-bold border-[var(--primary-200)]"
             [routerLinkActiveOptions]="{exact: item.route === '/dashboard'}"
             class="flex items-center gap-3 px-3 py-2.5 rounded-lg border border-transparent text-sm text-[var(--surface-600)] hover:bg-[var(--surface-100)] hover:text-[var(--surface-900)] transition-colors cursor-pointer">
            <i [class]="item.icon" class="text-base w-5 shrink-0"></i>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="p-4 border-t border-[var(--surface-200)]">
    <div class="flex items-center gap-3 px-3 py-2 rounded-lg bg-[var(--surface-50)] border border-[var(--surface-200)]">
      <div class="w-9 h-9 rounded-full bg-[var(--ink-strong)] flex items-center justify-center text-white text-xs font-bold">AU</div>
      <div class="flex-1 min-w-0">
        <p class="text-sm font-bold text-[var(--surface-900)] truncate">Admin User</p>
        <p class="text-xs text-[var(--surface-500)] truncate">admin@knights.local</p>
      </div>
    </div>
  </div>
</aside>
