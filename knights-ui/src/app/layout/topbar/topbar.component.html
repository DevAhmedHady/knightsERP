<header class="app-topbar sticky top-0 z-10 flex h-20 items-center justify-between gap-4 px-4 sm:px-6">
  <div class="flex min-w-0 items-center gap-4">
    <button
      (click)="toggleSidebar.emit()"
      type="button"
      aria-label="Toggle sidebar"
      class="app-icon-button shrink-0">
      <i class="pi pi-bars text-lg"></i>
    </button>
    <div class="min-w-0">
      <span class="app-topbar__eyebrow">Operations cockpit</span>
      <h1 class="app-topbar__title">Knights Admin</h1>
    </div>
  </div>

  <div class="hidden min-w-0 flex-1 items-center justify-center xl:flex">
    <label class="app-topbar-search">
      <i class="pi pi-search"></i>
      <input type="text" placeholder="Search users, roles, permissions" />
      <span class="app-topbar-search__hint">Ctrl K</span>
    </label>
  </div>

  <div class="flex items-center gap-2 sm:gap-3">
    <div class="app-topbar-chip hidden lg:flex">
      <i class="pi pi-star-fill text-xs"></i>
      <span>June access review</span>
    </div>

    <button
      (click)="themeService.toggle()"
      type="button"
      [attr.aria-label]="themeService.isDark() ? 'Use light mode' : 'Use dark mode'"
      class="app-icon-button">
      <i [class]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'" class="text-lg"></i>
    </button>

    <div class="app-topbar-profile">
      <div class="app-topbar-profile__avatar">AU</div>
      <div class="hidden text-left xl:block">
        <p class="app-topbar-profile__name">Admin User</p>
        <p class="app-topbar-profile__role">Security Admin</p>
      </div>
    </div>
  </div>
</header>
