<header class="sticky top-0 z-10 flex items-center justify-between px-4 sm:px-6 h-16 bg-[var(--surface-0)] backdrop-blur border-b border-[var(--surface-200)]">
  <div class="flex items-center gap-4">
    <button
      (click)="toggleSidebar.emit()"
      type="button"
      aria-label="Toggle sidebar"
      class="w-10 h-10 rounded-xl border border-[var(--surface-200)] bg-[var(--surface-0)] hover:bg-[var(--surface-100)] text-[var(--surface-500)] hover:text-[var(--surface-900)] transition-colors">
      <i class="pi pi-bars text-lg"></i>
    </button>
    <div>
      <h1 class="text-base font-extrabold text-[var(--surface-900)]">Knights Admin</h1>
      <p class="hidden sm:block text-xs text-[var(--surface-500)]">Access, roles, and permissions</p>
    </div>
  </div>

  <div class="flex items-center gap-3">
    <button
      (click)="themeService.toggle()"
      type="button"
      [attr.aria-label]="themeService.isDark() ? 'Use light mode' : 'Use dark mode'"
      class="w-10 h-10 rounded-xl border border-[var(--surface-200)] bg-[var(--surface-0)] hover:bg-[var(--surface-100)] text-[var(--surface-500)] hover:text-[var(--surface-900)] transition-colors">
      <i [class]="themeService.isDark() ? 'pi pi-sun' : 'pi pi-moon'" class="text-lg"></i>
    </button>

    <div class="w-9 h-9 rounded-full bg-[var(--ink-strong)] ring-2 ring-[var(--surface-0)] flex items-center justify-center text-white text-xs font-bold cursor-pointer shadow-sm">
      AU
    </div>
  </div>
</header>
