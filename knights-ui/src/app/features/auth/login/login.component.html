<div class="min-h-screen flex items-center justify-center px-4 py-8">
  <div class="w-full max-w-md app-panel p-6 sm:p-7">
    <div class="flex items-center gap-3 mb-7">
      <div class="w-10 h-10 rounded-lg bg-[var(--ink-strong)] flex items-center justify-center shadow-sm">
        <i class="pi pi-shield text-white"></i>
      </div>
      <div>
        <h1 class="text-xl font-extrabold text-[var(--surface-900)] leading-tight">Knights Admin</h1>
        <p class="text-sm text-[var(--surface-500)] mt-0.5">Sign in to continue</p>
      </div>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-4">
      <div class="flex flex-col gap-1.5">
        <label for="userNameOrEmail" class="text-sm font-medium text-[var(--surface-700)]">Username or Email</label>
        <input
          id="userNameOrEmail"
          pInputText
          formControlName="userNameOrEmail"
          autocomplete="username"
          placeholder="user@example.com" />
      </div>

      <div class="flex flex-col gap-1.5">
        <label for="password" class="text-sm font-medium text-[var(--surface-700)]">Password</label>
        <input
          id="password"
          pInputText
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Password" />
      </div>

      @if (error()) {
        <div class="rounded-lg border border-[var(--danger-100)] bg-[var(--danger-50)] px-3 py-2 text-sm text-[var(--danger-700)]">
          {{ error() }}
        </div>
      }

      <p-button
        type="submit"
        label="Sign in"
        icon="pi pi-sign-in"
        styleClass="w-full"
        [loading]="pending()"
        [disabled]="form.invalid || pending()" />
    </form>
  </div>
</div>
